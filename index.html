<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Live</title>

<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>

<body>

<div class="app-shell">

<header class="app-header glass">
  <div>
    <p>Campus shuttle tracking</p>
    <h1>Bus Live</h1>
  </div>

  <div class="header-controls">
    <div class="live-indicator">
      <span class="live-dot"></span>
      Live
    </div>
    <button id="theme-toggle" class="pill-button">🌗</button>
  </div>
</header>

<section class="controls glass">
  <div class="control-group">
    <label>Select Bus</label>
    <select id="bus-filter">
      <option value="all">All Buses</option>
    </select>
  </div>

  <div class="control-group">
    <span>Active Buses</span>
    <strong id="active-buses-count">0</strong>
  </div>
</section>

<section class="map-panel glass">
  <div class="map-topbar">
    <span>Live Map</span>
    <button id="toggle-center" class="pill-button">Center</button>
  </div>

  <div id="map" class="map-frame"></div>
</section>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="./script.js"></script>

</body>
</html>
