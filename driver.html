<script>
const API = 'https://college-bus-tracking-system-zeam.onrender.com/update';

let watchId = null;
let lastSent = 0;
let lastPosition = null;

/* THEME (unchanged) */
const toggleBtn = document.getElementById("theme-toggle");

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark");
}

toggleBtn.onclick = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
};

/* STATUS */
function setStatus(text, cls){
  const el = document.getElementById('driver-status');
  el.textContent = text;
  el.className = "status-badge " + cls;
}

/* DISTANCE CHECK (meters) */
function getDistance(a, b){
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLng = (b.lng - a.lng) * Math.PI/180;

  const x = Math.sin(dLat/2)**2 +
    Math.cos(a.lat*Math.PI/180) *
    Math.cos(b.lat*Math.PI/180) *
    Math.sin(dLng/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

/* START TRACKING */
function startTracking(){

  if(location.protocol !== "https:" && location.hostname !== "localhost"){
    setStatus("HTTPS Required", "offline");
    return;
  }

  if (!navigator.geolocation){
    setStatus("No GPS", "offline");
    return;
  }

  setStatus("Tracking...", "sending");

  watchId = navigator.geolocation.watchPosition(async pos => {

    const now = Date.now();

    const current = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    /* THROTTLE + DISTANCE FILTER */
    if(lastPosition){
      const dist = getDistance(lastPosition, current);

      if(dist < 5 && (now - lastSent < 5000)){
        return;
      }
    }

    lastPosition = current;
    lastSent = now;

    try {
      await fetch(API, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          bus_id: document.getElementById('bus-id-input').value.trim() || "Bus-1",
          lat: current.lat,
          lng: current.lng
        })
      });

      setStatus("Live", "live");

    } catch {
      setStatus("Offline", "offline");
    }

  }, () => {
    setStatus("Denied", "offline");
  }, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 10000
  });
}

startTracking();
</script>
