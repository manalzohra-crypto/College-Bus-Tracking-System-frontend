<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver GPS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="driver-shell">
  <div class="driver-card glass">

    <p class="eyebrow">Driver Panel</p>
    <h2>Share Location</h2>

    <div class="driver-input-group">
      <label>Bus ID</label>
      <input id="bus-id-input" value="Bus-1">
    </div>

    <div class="driver-status-row">
      <span>Status</span>
      <span id="driver-status" class="status-badge idle">Idle</span>
    </div>

  </div>
</div>

<script>
const API = 'https://college-bus-tracking-system-zeam.onrender.com/update';
let lastSent = 0;

function setStatus(text, cls){
  const el = document.getElementById('driver-status');
  el.textContent = text;
  el.className = "status-badge " + cls;
}

function getBusId() {
  return document.getElementById('bus-id-input').value.trim() || 'Bus-1';
}

function sendLocation() {
  const now = Date.now();
  if (now - lastSent < 4000) return;
  lastSent = now;

  setStatus("Sending", "sending");

  if (!navigator.geolocation) {
    setStatus("No GPS", "offline");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      await fetch(API, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          bus_id: getBusId(),
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        })
      });

      setStatus("Live", "live");

    } catch {
      setStatus("Offline", "offline");
    }

  }, () => {
    setStatus("GPS Denied", "offline");
  });
}

setInterval(sendLocation, 2000);
</script>

</body>
</html>
