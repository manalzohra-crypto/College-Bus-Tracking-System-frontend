<!DOCTYPE html>
<html>
<head>
<title>Driver Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="driver-shell">
  <div class="driver-card glass">

    <h2>Driver Panel</h2>

    <input id="bus-id" value="Bus-1">

    <div class="driver-status">
      <span>Status</span>
      <strong id="status">Idle</strong>
    </div>

  </div>
</div>

<script>
const API = "https://your-render-url.onrender.com/update";

function sendLocation(){

  navigator.geolocation.getCurrentPosition(async pos => {

    document.getElementById("status").textContent = "Sending";

    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        bus_id: document.getElementById("bus-id").value,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      })
    });

    document.getElementById("status").textContent = "Live";

  });
}

setInterval(sendLocation,2000);
</script>

</body>
</html>
