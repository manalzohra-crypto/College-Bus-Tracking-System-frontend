<!DOCTYPE html>
<html>
<head>
<title>Driver</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="driver-shell">
  <div class="driver-card glass">

    <h2>Driver Panel</h2>

    <input id="bus-id-input" value="Bus-1">

    <div class="driver-status-row">
      <span>Status</span>
      <span id="driver-status" class="status-badge idle">Idle</span>
    </div>

  </div>
</div>

<script>
const API = 'https://college-bus-tracking-system-zeam.onrender.com/update';

function setStatus(text, cls){
  const el = document.getElementById('driver-status');
  el.textContent = text;
  el.className = "status-badge " + cls;
}

function sendLocation() {

  if (!navigator.geolocation) {
    setStatus("No GPS", "offline");
    return;
  }

  setStatus("Sending", "sending");

  navigator.geolocation.getCurrentPosition(async pos => {

    await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        bus_id: document.getElementById('bus-id-input').value,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      })
    });

    setStatus("Live", "live");

  }, () => {
    setStatus("Denied", "offline");
  });
}

setInterval(sendLocation, 3000);
</script>

</body>
</html>
