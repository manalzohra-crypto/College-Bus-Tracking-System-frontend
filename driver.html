<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Driver Panel</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<button id="theme-toggle" class="pill-button theme-btn">🌗</button>

<div class="driver-shell">
  <div class="driver-card glass">

    <h2>Driver Panel</h2>

    <input id="bus-id-input" value="Bus-1">

    <div class="driver-status-row">
      <span>Status</span>
      <span id="driver-status" class="status-badge idle">Idle</span>
    </div>

  </div>
</div>

<script>
const API = 'https://college-bus-tracking-system-zeam.onrender.com/update';

/* THEME */
const toggleBtn = document.getElementById("theme-toggle");

if(localStorage.getItem("theme") === "dark"){
  document.body.classList.add("dark");
}

toggleBtn.onclick = () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
};

/* STATUS */
function setStatus(text, cls){
  const el = document.getElementById('driver-status');
  el.textContent = text;
  el.className = "status-badge " + cls;
}

/* GPS SEND */
function sendLocation() {

  if(location.protocol !== "https:" && location.hostname !== "localhost"){
    setStatus("HTTPS Needed", "offline");
    return;
  }

  if (!navigator.geolocation) {
    setStatus("No GPS", "offline");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {

    setStatus("Sending", "sending");

    try {
      await fetch(API, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          bus_id: document.getElementById('bus-id-input').value.trim() || "Bus-1",
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        })
      });

      setStatus("Live", "live");

    } catch {
      setStatus("Offline", "offline");
    }

  }, () => {
    setStatus("Denied", "offline");
  });
}

setInterval(sendLocation, 4000);
</script>

</body>
</html>
